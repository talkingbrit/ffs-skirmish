<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="FFS Series — live brackets, seeding and season leaderboards for the FFS community Valorant circuit.">
<title>FFS Series</title>
<style>
:root{
  --bg:#0d1117; --surface:#141a22; --surface2:#1b2330; --line:#232d3b; --line2:#2d3947;
  --text:#e8ebee; --muted:#8b97a3; --faint:#5c6975;
  --accent:#ff4655; --green:#3fb970; --gold:#e3b341;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#8ab4d8;text-decoration:none}
a:hover{text-decoration:underline}

/* header */
.topbar{position:sticky;top:0;z-index:10;background:rgba(13,17,23,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1080px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;gap:14px}
.brand{font-weight:700;font-size:14px;letter-spacing:2.5px;white-space:nowrap}
.brand em{color:var(--accent);font-style:normal}
.eventname{margin-left:auto;color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adminpill{flex:none;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(227,179,65,.35);border-radius:20px;padding:3px 10px}

/* nav */
.nav{border-bottom:1px solid var(--line);background:var(--bg)}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.nav button{background:none;border:none;color:var(--muted);font:inherit;font-size:13.5px;padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav button:hover{color:var(--text)}
.nav button.on{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.nav button.adm{color:var(--gold)}
.nav button.adm.on{border-bottom-color:var(--gold)}

main{max-width:1080px;margin:0 auto;padding:28px 24px 40px;width:100%;flex:1}

/* sections */
.sec{margin-bottom:30px}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.sec-head h2{font-size:12px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.sec-head .rule{flex:1;height:1px;background:var(--line)}
.sec-head .note{font-size:12px;color:var(--faint);white-space:nowrap}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:20px}
.card+.card{margin-top:14px}
.hint{color:var(--faint);font-size:12.5px;margin-top:10px;line-height:1.5}
.empty{padding:44px 20px;text-align:center;color:var(--muted)}
.empty b{display:block;color:var(--text);font-size:15px;margin-bottom:6px}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{color:var(--faint);text-transform:uppercase;font-size:10.5px;letter-spacing:1.2px;font-weight:600;padding:0 10px 9px;text-align:left;border-bottom:1px solid var(--line2)}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
td.r,th.r{text-align:right}
.rank1 td{color:var(--gold)}
.rank1 td:first-child{font-weight:700}
.seedchip{display:inline-block;min-width:26px;text-align:center;background:var(--surface2);border:1px solid var(--line2);border-radius:6px;padding:2px 6px;font-size:12px;font-weight:600;color:var(--muted)}
.rank1 .seedchip,.seedchip.top{color:var(--text);border-color:var(--accent);background:rgba(255,70,85,.12)}
.sub{color:var(--muted);font-size:12px}
.wl-w{color:var(--green);font-weight:600}
.wl-l{color:var(--faint)}

/* forms */
input,select{background:var(--bg);border:1px solid var(--line2);color:var(--text);padding:8px 10px;border-radius:7px;font:inherit;font-size:13px}
input:focus,select:focus{outline:none;border-color:#4a5a6d}
input.num{width:70px}
.btn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:7px;cursor:pointer;font:inherit;font-size:13px;font-weight:600}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--text);font-weight:500}
.btn.ghost:hover{border-color:#4a5a6d;filter:none}
.btn.sm{padding:5px 11px;font-size:12px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10.5px;text-transform:uppercase;color:var(--faint);letter-spacing:1px}

/* bracket */
.bwrap{overflow-x:auto;padding:4px 0 12px}
.bracket{display:flex;gap:36px;align-items:stretch;min-width:min-content}
.round{display:flex;flex-direction:column;justify-content:space-around;gap:18px;min-width:200px}
.rtitle{text-align:center;color:var(--faint);font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px}
.match{background:var(--surface);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.match.clickable{cursor:pointer}
.match.clickable:hover{border-color:#4a5a6d}
.match.final{border-color:rgba(227,179,65,.5)}
.mid{font-size:10px;color:var(--faint);padding:5px 12px 3px;letter-spacing:1px;text-transform:uppercase;background:var(--surface)}
.slot{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:13.5px;gap:10px;border-top:1px solid var(--line)}
.slot .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .name.tbd{color:var(--faint);font-style:italic}
.slot .name.bye{color:var(--faint);text-decoration:line-through}
.slot .score{color:var(--muted);font-weight:700;min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
.slot.win{background:rgba(63,185,112,.07)}
.slot.win .name{color:var(--green);font-weight:600}
.slot.win .score{color:var(--green)}
.podium{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.podium .pod{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:14px 18px;min-width:150px}
.podium .pod .place{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.podium .pod .tname{font-weight:700;font-size:15px}
.podium .pod.first{border-color:rgba(227,179,65,.5)}
.podium .pod.first .place,.podium .pod.first .tname{color:var(--gold)}

/* dialog */
dialog{background:var(--surface);color:var(--text);border:1px solid var(--line2);border-radius:10px;padding:24px;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
dialog::backdrop{background:rgba(0,0,0,.65)}
dialog h3{font-size:14px;margin-bottom:14px}

/* footer */
footer{border-top:1px solid var(--line);padding:18px 24px;text-align:center;color:var(--faint);font-size:12px}
footer .orglink{color:var(--faint);cursor:pointer}
footer .orglink:hover{color:var(--muted);text-decoration:none}
.admin-note{background:rgba(227,179,65,.07);border:1px solid rgba(227,179,65,.25);border-radius:9px;padding:10px 14px;font-size:12.5px;color:var(--muted);margin-bottom:16px}
/* player profile + sorting */
.pname{cursor:pointer;border-bottom:1px dotted var(--faint)}
.pname:hover{color:#8ab4d8;border-bottom-color:#8ab4d8}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}
th.sortable.on{color:var(--text)}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
.stat{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.stat .lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.stat .val{font-size:16px;font-weight:700}
.mid a{color:var(--faint);font-size:10px}
.mid a:hover{color:#8ab4d8}
@media(max-width:700px){.topbar-inner,.nav-inner,main{padding-left:14px;padding-right:14px}.eventname{display:none}.statgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner">
  <div class="brand">FFS <em>SERIES</em></div>
  <div class="eventname" id="evtName"></div>
  <div class="adminpill" id="adminPill" style="display:none">Organizer</div>
</div></div>
<div class="nav"><div class="nav-inner" id="nav"></div></div>
<main id="main"></main>
<footer>
  FFS Series · community Valorant circuit · <span id="lastUpd"></span>
  <span style="margin:0 6px;color:var(--line2)">|</span>
  <span class="orglink" id="orgLink" onclick="toggleAdmin()">Organizer sign-in</span>
</footer>

<dialog id="scoreDlg">
  <h3 id="dlgTitle">Report score</h3>
  <div class="row"><div class="field"><label id="dlgA">Team A</label><input class="num" id="scoreA" type="number" min="0"></div>
  <div class="field"><label id="dlgB">Team B</label><input class="num" id="scoreB" type="number" min="0"></div></div>
  <div class="row"><div class="field"><label>Tracker match link (optional)</label><input id="scoreLink" placeholder="https://tracker.gg/valorant/match/…" style="width:330px"></div></div>
  <div class="row" style="margin-bottom:0"><button class="btn" onclick="saveScore()">Save</button>
  <button class="btn ghost" onclick="clearScore()">Clear result</button>
  <button class="btn ghost" onclick="document.getElementById('scoreDlg').close()">Cancel</button></div>
</dialog>

<dialog id="playerDlg" style="min-width:420px">
  <h3 id="pdName">Player</h3>
  <div id="pdBody"></div>
  <div class="row" style="margin:16px 0 0"><button class="btn ghost" onclick="document.getElementById('playerDlg').close()">Close</button></div>
</dialog>

<script>
"use strict";
const RANKS = (() => { const out = []; ["Iron","Bronze","Silver","Gold","Platinum","Diamond","Ascendant","Immortal"].forEach(t => [1,2,3].forEach(d => out.push(t+" "+d))); out.push("Radiant"); return out; })();
const PLACE_PTS = {1:100, 2:70, 3:50, 4:35, 5:20, 6:20, 7:10, 8:10};

/* Shared community stats key — works for every visitor, no personal key needed. Replace in Settings if it ever gets rate-limited. */
const DEF_SETTINGS = {region:"eu", apiKey:"HDEV-f0c323e8-93a6-4d93-ada6-5902bf110a64", ghRepo:"talkingbrit/ffs-skirmish", ghToken:""};
let S = { event:"FFS Series — Event 1", teams:[], bracket:null, log:[], placements:{}, settings:{...DEF_SETTINGS} };
let admin = false;
try{ admin = localStorage.getItem("ffsOrganizer")==="1"; }catch(e){}
function persist(){ try{ S.updatedAt=Date.now(); localStorage.setItem("ffsSkirmishS1", JSON.stringify(S)); }catch(e){} queuePublish(); }
function restore(){ try{ const d = localStorage.getItem("ffsSkirmishS1"); if(d) S = Object.assign(S, JSON.parse(d)); }catch(e){} S.settings = Object.assign({...DEF_SETTINGS}, S.settings||{}); if(!S.settings.apiKey) S.settings.apiKey = DEF_SETTINGS.apiKey; }
restore();

/* ---------- live shared data (GitHub as backend) ---------- */
async function fetchPublished(){
  const repo=(S.settings&&S.settings.ghRepo)||"";
  if(repo){ try{
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/data.json`,{headers:{Accept:"application/vnd.github.raw+json"},cache:"no-store"});
    if(r.ok) return await r.json();
  }catch(e){} }
  try{ const r=await fetch("data.json",{cache:"no-store"}); if(r.ok) return await r.json(); }catch(e){}
  return null;
}
async function adoptPublished(){
  const d=await fetchPublished();
  const localStamp = S.updatedAt || ((S.teams.length||S.log.length) ? Infinity : 0);
  if(d && (d.updatedAt||1) > localStamp){
    const keep=S.settings; S=d; S.settings=Object.assign({...DEF_SETTINGS}, keep, (d.settings&&d.settings.apiKey)?d.settings:{});
    try{ localStorage.setItem("ffsSkirmishS1", JSON.stringify(S)); }catch(e){}
    render();
  }
}
adoptPublished();
/* viewers auto-refresh every 60s; organizers with a publish token don't (they're the source of truth) */
setInterval(()=>{ if(!(S.settings&&S.settings.ghToken)) adoptPublished(); }, 60000);

let pubTimer=null;
function queuePublish(){
  const s=S.settings||{};
  if(!s.ghToken||!s.ghRepo) return;
  clearTimeout(pubTimer);
  pubTimer=setTimeout(()=>publishSite(true), 3000);
}
async function publishSite(silent){
  const s=S.settings||{};
  if(!s.ghRepo||!s.ghToken) return alert("Set the GitHub repo and token in Settings first.");
  const pub={...S}; delete pub.settings; pub.updatedAt=S.updatedAt||Date.now();
  const url=`https://api.github.com/repos/${s.ghRepo}/contents/data.json`;
  const hdr={Authorization:"Bearer "+s.ghToken, Accept:"application/vnd.github+json"};
  try{
    let sha;
    const g=await fetch(url,{headers:hdr,cache:"no-store"});
    if(g.ok){ sha=(await g.json()).sha; }
    const body={message:"Update tournament data", content:btoa(unescape(encodeURIComponent(JSON.stringify(pub,null,2))))};
    if(sha) body.sha=sha;
    const p=await fetch(url,{method:"PUT",headers:hdr,body:JSON.stringify(body)});
    if(!p.ok) throw new Error("GitHub API "+p.status+(p.status===401||p.status===403?" — check the token":""));
    if(!silent) alert("Published — the live site is up to date.");
  }catch(e){ if(!silent) alert("Publish failed: "+e.message); else console.warn("Auto-publish failed:",e.message); }
}

/* ---------- seeding ---------- */
function pScore(p){
  const rank = (RANKS.indexOf(p.rank)+1)/25*100*0.5;
  const kd = Math.min(+p.kd||0,2)/2*100*0.25;
  const wr = (+p.wr||0)*0.15;
  const acs = Math.min(+p.acs||200,300)/300*100*0.10;
  return rank+kd+wr+acs;
}
function tScore(t){ return (pScore(t.p1)+pScore(t.p2))/2; }
function seededTeams(){ return [...S.teams].sort((a,b)=>tScore(b)-tScore(a)); }

/* ---------- bracket structures ---------- */
const SE_SEEDS = {4:[1,4,2,3], 8:[1,8,4,5,2,7,3,6], 16:[1,16,8,9,5,12,4,13,3,14,6,11,7,10,2,15]};
function deTemplate(n){
  if(n===4) return {rounds:[["Semifinals",[0,1]],["Upper Final",[2]],["Lower Round 1",[3]],["Lower Final",[4]],["Grand Final",[5]]],
    matches:[
      {a:["seed",1],b:["seed",4],r:"Semifinal 1"},{a:["seed",2],b:["seed",3],r:"Semifinal 2"},
      {a:["w",0],b:["w",1],r:"Upper Final"},
      {a:["l",0],b:["l",1],r:"Lower Round 1"},
      {a:["w",3],b:["l",2],r:"Lower Final"},
      {a:["w",2],b:["w",4],r:"Grand Final"}]};
  return {rounds:[["Upper Round 1",[0,1,2,3]],["Upper Semis",[4,5]],["Upper Final",[6]],["Lower Round 1",[7,8]],["Lower Round 2",[9,10]],["Lower Semi",[11]],["Lower Final",[12]],["Grand Final",[13]]],
    matches:[
      {a:["seed",1],b:["seed",8],r:"Upper R1"},{a:["seed",4],b:["seed",5],r:"Upper R1"},
      {a:["seed",2],b:["seed",7],r:"Upper R1"},{a:["seed",3],b:["seed",6],r:"Upper R1"},
      {a:["w",0],b:["w",1],r:"Upper Semi"},{a:["w",2],b:["w",3],r:"Upper Semi"},
      {a:["w",4],b:["w",5],r:"Upper Final"},
      {a:["l",0],b:["l",1],r:"Lower R1"},{a:["l",2],b:["l",3],r:"Lower R1"},
      {a:["w",7],b:["l",5],r:"Lower R2"},{a:["w",8],b:["l",4],r:"Lower R2"},
      {a:["w",9],b:["w",10],r:"Lower Semi"},
      {a:["w",11],b:["l",6],r:"Lower Final"},
      {a:["w",6],b:["w",12],r:"Grand Final"}]};
}
function seTemplate(n){
  const rounds=[]; const matches=[]; let prevStart=0;
  const names={16:["Round of 16","Quarterfinals","Semifinals","Final"],8:["Quarterfinals","Semifinals","Final"],4:["Semifinals","Final"]}[n];
  const seeds=SE_SEEDS[n];
  for(let i=0;i<n/2;i++) matches.push({a:["seed",seeds[2*i]],b:["seed",seeds[2*i+1]],r:names[0]});
  rounds.push([names[0],matches.map((_,i)=>i)]);
  let size=n/2, ri=1;
  while(size>1){
    const start=matches.length, idxs=[];
    for(let i=0;i<size/2;i++){ matches.push({a:["w",prevStart+2*i],b:["w",prevStart+2*i+1],r:names[ri]}); idxs.push(start+i); }
    rounds.push([names[ri],idxs]); prevStart=start; size/=2; ri++;
  }
  return {rounds,matches};
}
function genBracket(type){
  const teams = seededTeams();
  if(teams.length<3){ alert("Add at least 3 teams first."); return; }
  if(teams.length>16){ alert("Max 16 teams."); return; }
  let size = teams.length<=4?4:teams.length<=8?8:16;
  if(type==="de" && size===16){ alert("Double elimination supports up to 8 teams — using single elimination."); type="se"; }
  const slots = teams.map(t=>t.name); while(slots.length<size) slots.push("BYE");
  const tpl = type==="de"?deTemplate(size):seTemplate(size);
  S.bracket = { type, size, slots, results:{}, matches:tpl.matches, rounds:tpl.rounds };
  persist(); render();
}
function resolveSlot(src){
  const b=S.bracket;
  if(src[0]==="seed") return b.slots[src[1]-1] ?? "BYE";
  const res=matchOutcome(src[1]);
  return src[0]==="w" ? res.winner : res.loser;
}
function matchOutcome(i){
  const b=S.bracket, m=b.matches[i];
  const A=resolveSlot(m.a), B=resolveSlot(m.b);
  if(A==null||B==null) return {A,B,winner:null,loser:null};
  if(A==="BYE"&&B==="BYE") return {A,B,winner:"BYE",loser:"BYE"};
  if(A==="BYE") return {A,B,winner:B,loser:"BYE"};
  if(B==="BYE") return {A,B,winner:A,loser:"BYE"};
  const r=b.results[i];
  if(r&&r.a!==r.b) return {A,B,winner:r.a>r.b?A:B,loser:r.a>r.b?B:A};
  return {A,B,winner:null,loser:null};
}
function finalPlacements(){
  const b=S.bracket; if(!b) return [];
  const out=[]; const push=(p,t)=>{ if(t&&t!=="BYE") out.push([p,t]); };
  const last=b.matches.length-1;
  if(b.type==="se"){
    const f=matchOutcome(last); push("1st",f.winner); push("2nd",f.loser);
  } else {
    const gf=matchOutcome(last); push("1st",gf.winner); push("2nd",gf.loser);
    const lf=matchOutcome(last-1); push("3rd",lf.loser);
    if(b.size===8){ push("4th",matchOutcome(11).loser); push("5th–6th",matchOutcome(9).loser); push("5th–6th",matchOutcome(10).loser); }
    else push("4th",matchOutcome(3).loser);
  }
  return out;
}
function teamRecord(name){
  let w=0,l=0; const b=S.bracket;
  if(b) b.matches.forEach((m,i)=>{ const o=matchOutcome(i);
    if(o.winner&&o.winner!=="BYE"&&o.loser!=="BYE"){ if(o.winner===name)w++; if(o.loser===name)l++; } });
  return {w,l};
}

/* ---------- match log / player stats ---------- */
function playerAgg(){
  const agg={};
  S.log.forEach(e=>{
    const k=e.player; agg[k]=agg[k]||{team:e.team,maps:0,k:0,d:0,a:0,acs:0,w:0,fk:0,fd:0};
    const p=agg[k]; p.maps++; p.k+=+e.k; p.d+=+e.d; p.a+=+e.a; p.acs+=+e.acs; p.w+=e.won?1:0;
    p.fk+=+e.fk||0; p.fd+=+e.fd||0; p.team=e.team;
  });
  return Object.entries(agg).map(([name,p])=>{
    const kd=p.k/Math.max(p.d,1), kda=(p.k+p.a/2)/Math.max(p.d,1), avg=p.acs/p.maps;
    return {name,...p,kd,kda,avg,wr:p.w/p.maps*100,rating:avg/200*50+Math.min(kda,3)/3*50};
  }).sort((a,b)=>b.rating-a.rating);
}
function riotOf(name){
  for(const t of S.teams){ if(t.p1.name===name) return t.p1; if(t.p2.name===name) return t.p2; }
  return null;
}
/* ---------- player profile modal (live last-10 stats) ---------- */
const pdCache={};
function stat(l,v){ return `<div class="stat"><div class="lbl">${l}</div><div class="val">${esc(String(v))}</div></div>`; }
async function showPlayer(name){
  const p=riotOf(name);
  const dlg=document.getElementById("playerDlg"), body=document.getElementById("pdBody");
  document.getElementById("pdName").textContent = name + (p&&p.riot?"  ·  "+p.riot:"");
  const seedLine = p?`<div class="hint" style="margin-top:12px">Individual seed score: <b>${pScore(p).toFixed(1)}</b> — 50% rank · 25% K/D · 15% win rate · 10% ACS${p.riot?` · ${trackerLink(p.riot)}`:""}</div>`:"";
  dlg.showModal();
  if(!p||!p.riot){ body.innerHTML=`<div class="hint">No Riot ID on file for this player.</div>`+seedLine; return; }
  body.innerHTML=`<div class="hint">Loading last 10 competitive matches…</div>`;
  try{
    const st = pdCache[p.riot] || (pdCache[p.riot] = await pullPlayer(p.riot));
    const f=(v,d=1)=>v==null?"—":(+v).toFixed(d);
    body.innerHTML=`<div class="statgrid">
      ${stat("Rank", st.rank||"Unranked")}
      ${stat("K/D", f(st.kd,2))}
      ${stat("Win rate", f(st.wr)+"%")}
      ${stat("Headshot %", f(st.hs)+"%")}
      ${stat("Avg ACS", f(st.acs,0))}
      ${stat("Sample", st.maps+" maps")}
    </div>`+seedLine;
  }catch(e){ delete pdCache[p.riot]; body.innerHTML=`<div class="hint">Couldn't load live stats: ${esc(e.message)}</div>`+seedLine; }
}

/* ---------- HenrikDev API stat pull ---------- */
async function apiGet(path){
  const s=S.settings||{};
  if(!s.apiKey) throw new Error("Set the HenrikDev API key in Settings first.");
  const r=await fetch("https://api.henrikdev.xyz"+path+(path.includes("?")?"&":"?")+"api_key="+encodeURIComponent(s.apiKey));
  const j=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error("Stats API "+r.status+(j.errors?" — "+(j.errors[0]&&(j.errors[0].message||j.errors[0].details)||""):""));
  return j.data;
}
async function pullPlayer(riot){
  const i=riot.lastIndexOf("#");
  if(i<1) throw new Error("Riot ID must be Name#Tag");
  const name=encodeURIComponent(riot.slice(0,i)), tag=encodeURIComponent(riot.slice(i+1));
  const reg=(S.settings&&S.settings.region)||"eu";
  const mmr=await apiGet(`/valorant/v2/mmr/${reg}/${name}/${tag}`);
  const rank=(mmr&&mmr.current_data&&mmr.current_data.currenttierpatched)||"";
  const ms=await apiGet(`/valorant/v3/matches/${reg}/${name}/${tag}?filter=competitive&size=10`);
  let k=0,d=0,h=0,b=0,l=0,w=0,n=0,sc=0,rounds=0;
  (ms||[]).forEach(m=>{
    const ps=(m.players&&(m.players.all_players||[]))||[];
    const me=ps.find(p=>(p.name+"#"+p.tag).toLowerCase()===riot.toLowerCase());
    if(!me||!me.stats) return;
    k+=me.stats.kills||0; d+=me.stats.deaths||0;
    h+=me.stats.headshots||0; b+=me.stats.bodyshots||0; l+=me.stats.legshots||0;
    sc+=me.stats.score||0;
    rounds+=(m.metadata&&m.metadata.rounds_played)||0;
    const team=(me.team||"").toLowerCase();
    if(m.teams&&m.teams[team]&&m.teams[team].has_won) w++;
    n++;
  });
  if(!n&&!rank) throw new Error("No competitive data found — is the match history public?");
  return { rank, kd:n?k/Math.max(d,1):null, wr:n?w/n*100:null, hs:(h+b+l)?h/(h+b+l)*100:null, acs:rounds?sc/rounds:null, maps:n };
}
async function fetchStats(n){
  const btn=document.getElementById(`p${n}fetch`);
  const riot=document.getElementById(`p${n}r`).value.trim();
  if(!riot) return alert("Enter the Riot ID (Name#Tag) first");
  btn.textContent="Fetching…"; btn.disabled=true;
  try{
    const st=await pullPlayer(riot);
    if(st.rank&&RANKS.includes(st.rank)) document.getElementById(`p${n}rank`).value=st.rank;
    if(st.kd!=null) document.getElementById(`p${n}kd`).value=st.kd.toFixed(2);
    if(st.wr!=null) document.getElementById(`p${n}wr`).value=st.wr.toFixed(1);
    if(st.acs!=null) document.getElementById(`p${n}acs`).value=st.acs.toFixed(0);
    btn.textContent=`Done (${st.maps} maps)`;
  }catch(e){ btn.textContent="Pull stats"; alert(e.message); }
  btn.disabled=false;
}

    <div class="sec">${secHead("Stats API")}
    <div class="card"><div class="row"><div class="field"><label>Region</label><select id="setRegion">${regions.map(r=>`<option ${s.region===r?"selected":""}>${r}</option>`).join("")}</select></div>
    <div class="field"><label>HenrikDev API key</label><input id="setKey" type="password" value="${esc(s.apiKey)}" style="width:320px" placeholder="HDEV-…"></div>
    <button class="btn" onclick="Object.assign(S.settings,{region:document.getElementById('setRegion').value,apiKey:document.getElementById('setKey').value.trim()});persist();render()">Save</button></div>
    <div class="hint">Powers the “Pull stats” buttons on team registration. A shared community key ships with the site, so visitors and organizers work out of the box — replace it here only if it gets rate-limited (free keys: <a href="https://api.henrikdev.xyz/dashboard" target="_blank" rel="noopener">api.henrikdev.xyz/dashboard</a>). Players' match history must be public.</div></div></div>

    <div class="sec">${secHead("Live publishing")}
    <div class="card"><div class="row"><div class="field"><label>Repository</label><input id="setRepo" value="${esc(s.ghRepo||"")}" style="width:240px" placeholder="user/repo"></div>
    <div class="field"><label>GitHub token</label><input id="setGhTok" type="password" value="${esc(s.ghToken||"")}" style="width:300px" placeholder="github_pat_…"></div>
    <button class="btn" onclick="S.settings.ghRepo=document.getElementById('setRepo').value.trim();S.settings.ghToken=document.getElementById('setGhTok').value.trim();persist();render()">Save</button>
    <button class="btn ghost" onclick="publishSite(false)">Publish now</button></div>
    <div class="hint">With a token saved, every change publishes to the public site within seconds. Fine-grained token: repository access limited to this repo, Contents read &amp; write. Never included in published data.</div></div></div>

    <div class="sec">${secHead("Data")}
    <div class="card"><div class="row" style="margin-bottom:0"><button class="btn ghost" onclick="exportJSON()">Export backup (JSON)</button>
    <label class="btn ghost" style="cursor:pointer">Import JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
    <button class="btn ghost" onclick="if(confirm('Wipe ALL tournament data? This publishes an empty site.')){S={event:S.event,teams:[],bracket:null,log:[],placements:{},settings:S.settings};persist();render()}">Wipe all data</button></div>
    <div class="hint">Export a backup after every event. The Discord bot's /export file imports here directly, and vice versa.</div></div></div>`;
}
function exportJSON(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"}));
  a.download="ffs-skirmish-data.json"; a.click();
}
function importJSON(inp){
  const f=inp.files[0]; if(!f) return;
  f.text().then(t=>{ const d=JSON.parse(t); d.settings=d.settings||S.settings; S=d; S.settings=Object.assign({...DEF_SETTINGS},S.settings); persist(); render(); }).catch(()=>alert("Invalid file"));
}
render();
</script>
</body>
</html>
